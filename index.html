<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy: Che si fa?</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            background: #f5f5f5;
        }

        .tab-button {
            flex: 1;
            padding: 20px;
            border: none;
            background: none;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tab-button:hover {
            background: #eaeaea;
            color: #333;
        }

        .tab-button.active {
            background: white;
            color: #667eea;
            border-bottom: 4px solid #667eea;
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
            padding: 40px;
            animation: fadeIn 0.3s ease;
            min-height: 500px;
        }

        .tab-content.active {
            display: block;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-size: 1.1em;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            margin: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Markdown Styling */
        .policy-content h1 {
            font-size: 2em;
            color: #333;
            margin: 30px 0 20px 0;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .policy-content h2 {
            font-size: 1.6em;
            color: #444;
            margin: 25px 0 15px 0;
            font-weight: 700;
        }

        .policy-content h3 {
            font-size: 1.3em;
            color: #555;
            margin: 20px 0 12px 0;
        }

        .policy-content p {
            line-height: 1.8;
            color: #555;
            margin: 15px 0;
            font-size: 1em;
        }

        .policy-content strong {
            color: #333;
            font-weight: 700;
        }

        .policy-content em {
            color: #666;
            font-style: italic;
        }

        .policy-content blockquote {
            border-left: 4px solid #667eea;
            background: #f0f4ff;
            padding: 15px 20px;
            margin: 20px 0;
            border-radius: 4px;
            color: #555;
        }

        .policy-content blockquote p {
            margin: 0;
        }

        .policy-content ul {
            margin: 15px 0 15px 30px;
            color: #555;
        }

        .policy-content ul li {
            margin: 10px 0;
            line-height: 1.8;
        }

        .policy-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #fafafa;
            border-radius: 8px;
            overflow: hidden;
        }

        .policy-content table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .policy-content table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        .policy-content table tr:last-child td {
            border-bottom: none;
        }

        .policy-content table tr:nth-child(even) {
            background: #f5f5f5;
        }

        .policy-content a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #667eea;
            transition: all 0.2s ease;
        }

        .policy-content a:hover {
            color: #764ba2;
            border-bottom-style: solid;
        }

        .policy-content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            color: #d63384;
            font-size: 0.95em;
        }

        .policy-content hr {
            border: none;
            border-top: 2px solid #e0e0e0;
            margin: 30px 0;
        }

        /* Footer */
        .footer {
            background: #f5f5f5;
            padding: 30px 40px;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 0.9em;
            text-align: center;
        }

        .footer p {
            margin: 5px 0;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .tab-content {
                padding: 20px;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-button {
                border-bottom: none;
                border-right: 4px solid transparent;
                padding: 15px;
            }

            .tab-button.active {
                border-right: 4px solid #667eea;
                border-bottom: none;
            }

            .policy-content h1 {
                font-size: 1.5em;
            }

            .policy-content h2 {
                font-size: 1.3em;
            }

            .policy-content table {
                font-size: 0.9em;
            }

            .policy-content table th,
            .policy-content table td {
                padding: 8px;
            }
        }

        /* Print Styles */
        @media print {
            body {
                background: white;
            }

            .container {
                box-shadow: none;
                border-radius: 0;
            }

            .header {
                page-break-after: avoid;
            }

            .tabs {
                display: none;
            }

            .tab-content {
                display: block !important;
                page-break-inside: avoid;
            }

            .policy-content h1,
            .policy-content h2 {
                page-break-after: avoid;
            }

            .policy-content table {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Privacy Policy</h1>
            <p>Che si fa? Data Privacy & Protection</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab(event, 'english')">
                🇬🇧 English
            </button>
            <button class="tab-button" onclick="switchTab(event, 'italian')">
                🇮🇹 Italiano
            </button>
        </div>

        <div id="english" class="tab-content active">
            <div class="policy-content" id="english-content">
                <div class="loading">Loading English privacy policy...</div>
            </div>
        </div>

        <div id="italian" class="tab-content">
            <div class="policy-content" id="italian-content">
                <div class="loading">Loading Italian privacy policy...</div>
            </div>
        </div>

        <div class="footer">
            <p><strong>Last Updated:</strong> June 6, 2026</p>
            <p><strong>App Version:</strong> 1.0.0</p>
            <p style="margin-top: 15px; font-style: italic;">For privacy inquiries: <strong>chesifa.app@gmail.com</strong></p>
        </div>
    </div>

    <script>
        // Load and render markdown files
        async function loadMarkdownFiles() {
            try {
                // Fetch English policy
                const enResponse = await fetch('privacy-policy-en.md');
                if (!enResponse.ok) throw new Error(`English file not found: ${enResponse.status}`);
                const enContent = await enResponse.text();
                
                // Fetch Italian policy
                const itResponse = await fetch('privacy-policy-it.md');
                if (!itResponse.ok) throw new Error(`Italian file not found: ${itResponse.status}`);
                const itContent = await itResponse.text();

                // Render with marked.js
                if (typeof marked !== 'undefined') {
                    document.getElementById('english-content').innerHTML = marked.parse(enContent);
                    document.getElementById('italian-content').innerHTML = marked.parse(itContent);
                } else {
                    throw new Error('Marked.js library not loaded');
                }
            } catch (error) {
                console.error('Error loading markdown files:', error);
                document.getElementById('english-content').innerHTML = 
                    `<div class="error"><strong>Error loading English policy:</strong> ${error.message}</div>`;
                document.getElementById('italian-content').innerHTML = 
                    `<div class="error"><strong>Error loading Italian policy:</strong> ${error.message}</div>`;
            }
        }

        // Load files when page loads
        document.addEventListener('DOMContentLoaded', loadMarkdownFiles);

        // Tab switching function
        function switchTab(event, tabName) {
            // Hide all tabs
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(tab => {
                tab.classList.remove('active');
            });

            // Remove active class from all buttons
            const tabButtons = document.querySelectorAll('.tab-button');
            tabButtons.forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');

            // Add active class to clicked button
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
